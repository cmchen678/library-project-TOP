<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <button class="add-btn" command="show-modal" commandfor="book-input">Add Book</button>
        <dialog id="book-input" closedby="any">
            <form id="book-form">
                <label for="book_title">Title:</label>
                <input type="text" id="book_title" name="book_title"/>
                <label for="book_author">Author:</label>
                <input type="text" id="book_author" name="book_author"/>
                <label for="book_pages">Pages:</label>
                <input type="number" id="book_pages" name="book_pages"/>
                <label for="book_read">Read:</label>
                <p>Have you read this book?</p>
                <label>
                    <input type="radio" name="book_read" value="Yes"/> Yes
                </label>
                <label>
                    <input type="radio" name="book_read" value="No"/> No
                </label>             
                <button class="submit-btn" type="submit" action="" method="POST">Add Book</button>
            </form>
        </dialog>
        <div class="book-container"></div>
    </div>
</body>
</html>
